<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan - Login</title>
    <link rel="stylesheet" href="auth-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left side - Gradient Background -->
        <div class="auth-left">
            <div class="auth-logo">
                <i class="fas fa-heartbeat"></i>
                <h1>MediScan</h1>
            </div>
        </div>

        <!-- Right side - Login Form -->
        <div class="auth-right">
            <div class="auth-form-container">
                <!-- Celebration Icon -->
                <div class="celebration-icon">
                    🎉
                </div>

                <!-- Welcome Text -->
                <h2 class="auth-title">Welcome Back!</h2>
                <p class="auth-subtitle">Login to plan your next adventure</p>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Enter your password"
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember me & Forgot Password -->
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Logging in...
                        </span>
                    </button>

                    <!-- Error Message -->
                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Google Sign In -->
                <button type="button" class="btn-google" id="googleSignInBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.8055 10.2292C19.8055 9.55209 19.7508 8.86805 19.6348 8.19792H10.2V12.0485H15.6018C15.3773 13.2909 14.6571 14.3896 13.6025 15.0875V17.5867H16.825C18.7173 15.8447 19.8055 13.2728 19.8055 10.2292Z" fill="#4285F4"/>
                        <path d="M10.2 20C12.9665 20 15.2722 19.1045 16.825 17.5867L13.6025 15.0875C12.7033 15.6974 11.5516 16.0429 10.2 16.0429C7.5287 16.0429 5.28546 14.2828 4.48181 11.9163H1.15625V14.4918C2.74509 17.6512 6.33713 20 10.2 20Z" fill="#34A853"/>
                        <path d="M4.48181 11.9163C4.07376 10.6739 4.07376 9.33261 4.48181 8.09017V5.51465H1.15625C-0.385417 8.58605 -0.385417 12.4203 1.15625 15.4917L4.48181 11.9163Z" fill="#FBBC04"/>
                        <path d="M10.2 3.95708C11.6244 3.93536 13.0008 4.47269 14.0372 5.45353L16.8978 2.60334C15.1854 0.990601 12.9301 0.109026 10.2 0.133577C6.33713 0.133577 2.74509 2.48239 1.15625 5.64175L4.48181 8.21727C5.28546 5.85077 7.5287 3.95708 10.2 3.95708Z" fill="#EA4335"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>

                <!-- Sign Up Link -->
                <p class="signup-link">
                    Don't have an account? <a href="signup.html" id="signUpLink">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase config module
        import { initializeFirebase } from './firebase-config.js';
        
        // Import Firebase Auth functions
        import { 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let auth;

        // Initialize Firebase
        async function setupFirebase() {
            try {
                const { auth: firebaseAuth } = await initializeFirebase();
                auth = firebaseAuth;
                
                // Check if user is already logged in
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        // User is signed in, redirect to main app
                        window.location.href = 'index.html';
                    }
                });
            } catch (error) {
                console.error('Firebase setup error:', error);
                showError('Authentication service is not available. Please contact support.');
                setLoading(false);
            }
        }

        // Initialize on page load
        setupFirebase();

        const googleProvider = new GoogleAuthProvider();

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const loginBtn = document.getElementById('loginBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePasswordBtn.querySelector('i').classList.toggle('fa-eye');
            togglePasswordBtn.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // Show loading state
        function setLoading(isLoading) {
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoader = loginBtn.querySelector('.btn-loader');
            
            if (isLoading) {
                btnText.style.display = 'none';
                btnLoader.style.display = 'inline-block';
                loginBtn.disabled = true;
                googleSignInBtn.disabled = true;
            } else {
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
                loginBtn.disabled = false;
                googleSignInBtn.disabled = false;
            }
        }

        // Email/Password Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = rememberMeCheckbox.checked;

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            setLoading(true);

            try {
                // Set persistence based on remember me checkbox
                const persistence = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistence);

                // Sign in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                console.log('User logged in:', user);
                
                // Redirect to main app
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMsg = 'Login failed. Please try again.';
                if (error.code === 'auth/user-not-found') {
                    errorMsg = 'No account found with this email.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMsg = 'Incorrect password.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Invalid email address.';
                } else if (error.code === 'auth/user-disabled') {
                    errorMsg = 'This account has been disabled.';
                }
                
                showError(errorMsg);
                setLoading(false);
            }
        });

        // Google Sign In
        googleSignInBtn.addEventListener('click', async () => {
            setLoading(true);

            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                console.log('User logged in with Google:', user);
                
                // Redirect to main app
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Google sign in error:', error);
                
                let errorMsg = 'Google sign in failed. Please try again.';
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMsg = 'Sign in cancelled.';
                } else if (error.code === 'auth/popup-blocked') {
                    errorMsg = 'Pop-up was blocked. Please enable pop-ups.';
                }
                
                showError(errorMsg);
                setLoading(false);
            }
        });

        // Check if user is already logged in
        // (Already handled in setupFirebase)
    </script>
</body>
</html>
