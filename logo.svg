<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <!-- Stethoscope -->
  <path d="M 100 60 Q 100 40, 120 40 L 120 120 Q 120 140, 140 140 Q 160 140, 160 120 L 160 60" 
        fill="none" stroke="#1976D2" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="50" r="12" fill="#1976D2"/>
  <circle cx="160" cy="160" r="15" fill="#1976D2"/>
  <circle cx="155" cy="165" r="8" fill="white"/>
  
  <!-- Brain with circuit -->
  <ellipse cx="140" cy="80" rx="35" ry="30" fill="none" stroke="#00897B" stroke-width="6"/>
  
  <!-- Circuit nodes -->
  <circle cx="140" cy="65" r="5" fill="#00897B"/>
  <circle cx="125" cy="80" r="5" fill="#00897B"/>
  <circle cx="155" cy="80" r="5" fill="#00897B"/>
  <circle cx="140" cy="95" r="5" fill="#00897B"/>
  
  <!-- Circuit lines -->
  <line x1="140" y1="65" x2="125" y2="80" stroke="#00897B" stroke-width="3"/>
  <line x1="140" y1="65" x2="155" y2="80" stroke="#00897B" stroke-width="3"/>
  <line x1="125" y1="80" x2="140" y2="95" stroke="#00897B" stroke-width="3"/>
  <line x1="155" y1="80" x2="140" y2="95" stroke="#00897B" stroke-width="3"/>
  
  <!-- Text -->
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1976D2">Medi</text>
  <text x="360" y="110" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#00897B">Scan</text>
</svg>
